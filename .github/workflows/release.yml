name: Build and Publish Latest Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5
        with:
          go-version: '1.24'

      - name: Build release binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS="$os" GOARCH="$arch" go build \
                -o "dist/devbox-$os-$arch" \
                -ldflags "-X main.ServerURL=${{ secrets.SERVER_URL }}" .
            done
          done

      - name: Create new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            dist/devbox-linux-amd64 \
            dist/devbox-linux-arm64 \
            dist/devbox-darwin-amd64 \
            dist/devbox-darwin-arm64 \
            --target "${{ github.sha }}" \
            --title "Latest build" \
            --notes "Auto-generated Linux and macOS builds for amd64 and arm64 from main" \
            --latest
